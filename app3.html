<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>オンラインミーティング英会話スピーキング・厳選100問</title>
    <style>
        body { font-family: sans-serif; background-color: #f8fafc; color: #1e293b; margin: 0; padding: 0; display: flex; flex-direction: column; min-height: 100vh; }
        header { background-color: #0f172a; color: white; padding: 15px; text-align: center; font-size: 1.2rem; font-weight: bold; }
        main { flex-grow: 1; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .card { background: white; padding: 30px; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); width: 100%; max-width: 550px; text-align: center; box-sizing: border-box; }
        h2 { margin-top: 0; color: #0f172a; }
        p { color: #475569; font-size: 0.95rem; line-height: 1.6; }
        .btn { background-color: #2563eb; color: white; border: none; padding: 12px 35px; font-size: 1rem; border-radius: 25px; cursor: pointer; font-weight: bold; }
        .btn:hover { background-color: #1d4ed8; }
        .progress-bg { width: 100%; background: #e2e8f0; height: 8px; border-radius: 4px; margin-bottom: 15px; overflow: hidden; }
        .progress-bar { background: #2563eb; height: 100%; width: 0%; transition: width 0.3s; }
        .flex-space { display: flex; justify-content: space-between; font-size: 0.85rem; color: #64748b; margin-bottom: 20px; font-weight: bold; }
        .q-text { font-size: 1.35rem; font-weight: bold; margin: 20px 0; color: #0f172a; min-height: 70px; display: flex; align-items: center; justify-content: center; line-height: 1.5; }
        .btn-record { background-color: #ef4444; color: white; border: none; width: 80px; height: 80px; border-radius: 50%; cursor: pointer; font-size: 2rem; display: inline-flex; align-items: center; justify-content: center; box-shadow: 0 4px 10px rgba(239,68,68,0.2); }
        .recording { animation: pulse 1.2s infinite; background-color: #dc2626; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.06); } 100% { transform: scale(1); } }
        .btn-next { background-color: #e2e8f0; color: #94a3b8; border: none; padding: 10px 25px; border-radius: 6px; cursor: not-allowed; float: right; font-weight: bold; }
        .btn-next.active { background-color: #2563eb; color: white; cursor: pointer; }
        .clearfix::after { content: ""; clear: both; display: table; }
        .report-list { max-height: 400px; overflow-y: auto; text-align: left; margin-bottom: 25px; }
        .report-item { border: 1px solid #e2e8f0; background: #f8fafc; padding: 15px; border-radius: 12px; margin-bottom: 15px; }
        .report-top { display: flex; justify-content: space-between; border-bottom: 1px solid #e2e8f0; padding-bottom: 5px; font-weight: bold; }
        .txt-label { font-size: 0.75rem; color: #64748b; margin-top: 8px; font-weight: bold; }
        .model-ans { font-size: 1.05rem; font-style: italic; color: #1e3a8a; margin: 2px 0; font-weight: bold; }
        .user-ans { font-size: 1.05rem; color: #dc2626; margin: 2px 0; font-weight: bold; }
        .user-ans.good { color: #16a34a; }
        .comment-box { background: #eff6ff; padding: 10px; border-radius: 6px; font-size: 0.85rem; color: #1e40af; border-left: 4px solid #3b82f6; margin-top: 8px; }
        .audio-player { margin-top: 8px; width: 100%; height: 32px; }

        .select-wrapper { margin: 20px 0 25px 0; }
        .select-count { padding: 10px 20px; font-size: 1rem; border-radius: 8px; border: 2px solid #cbd5e1; font-weight: bold; color: #1e293b; outline: none; cursor: pointer; }
        .select-count:focus { border-color: #2563eb; }
    </style>
</head>
<body>

    <header>🌐 オンラインミーティング英会話スピーキング・厳選100問</header>

    <main>
        <div id="start-screen" class="card">
            <h2>オンラインミーティング発話トレーニング</h2>
            <p>WEB会議で頻出する<b>オンラインミーティングの必須フレーズ</b>が、100個のプールから毎回ランダムに出題されます。<br>マイクに向かって英語を話すと、自動で文字起こしされ、<b>単語の一致度</b>を採点します。<br>結果画面では、<b>自分の録音を聞き返す</b>ことができます。</p>

            <div class="select-wrapper">
                <label for="select-count" style="font-weight: bold; margin-right: 10px;">出題数：</label>
                <select id="select-count" class="select-count">
                    <option value="1">1 問</option>
                    <option value="2">2 問</option>
                    <option value="3">3 問</option>
                    <option value="4">4 問</option>
                    <option value="5">5 問</option>
                    <option value="6">6 問</option>
                    <option value="7">7 問</option>
                    <option value="8">8 問</option>
                    <option value="9">9 問</option>
                    <option value="10" selected>10 問</option>
                </select>
            </div>

            <button id="btn-start" class="btn">トレーニングを始める</button>
        </div>

        <div id="practice-screen" class="card" style="display: none;">
            <div class="progress-bg"><div id="progress-bar" class="progress-bar"></div></div>
            <div class="flex-space">
                <span id="question-number">第 1 問 / 10</span>
                <span id="timer" style="color: #ef4444; display: none; font-weight: bold;">● 録音・解析中...</span>
            </div>
            <div style="font-size: 0.8rem; color: #2563eb; font-weight: bold; text-align: left;">お題の日本語</div>
            <div id="question-text" class="q-text">読み込み中...</div>

            <div style="margin: 25px 0;">
                <button id="btn-record" class="btn-record">🎤</button>
                <p id="record-status" style="font-size: 0.9rem; color: #64748b; margin-top: 10px;">ボタンを押して、英語で喋ってください</p>
                <div id="live-transcript" style="font-size: 1.1rem; font-weight: bold; color: #2563eb; margin-top: 10px; min-height: 24px;"></div>
            </div>

            <div class="clearfix">
                <button id="btn-next" class="btn-next" disabled>次へ進む →</button>
            </div>
        </div>

        <div id="result-screen" class="card" style="display: none;">
            <h2>🎉 トレーニング完了！</h2>
            <p>今回の音声解析結果と、文字起こしされたデータです。プレイヤーでご自身の声を確認できます。</p>
            <div id="report-container" class="report-list"></div>
            <button id="btn-restart" class="btn">もう一度挑戦する</button>
        </div>
    </main>

    <script>
        // オンラインミーティング例文100問のプール（Q1〜Q60: 標準 / Q61〜Q100: 少し複雑・丁寧）
        const questionPool = [
            { q: "私の声がはっきりと聞こえますか。", a: "Can you hear me clearly?", advice: "hear me は「ヒアミー」と繋げて発音しましょう。" },
            { q: "あなたの画面がフリーズしているようです。", a: "It seems like your screen is frozen.", advice: "seems like は「シームズライク」と滑らかに繋げます。" },
            { q: "もう一度それを言ってください。", a: "Please say that again.", advice: "say that の 't' は飲み込むように発音すると自然です。" },
            { q: "あなたのマイクはミュートになっています。", a: "Your microphone is on mute.", advice: "on mute は「オンミュート」とはっきり発音します。" },
            { q: "私の画面を共有します。", a: "I will share my screen.", advice: "share my の 'r' から 'm' への移行をスムーズに。" },
            { q: "私の画面が見えますか。", a: "Can you see my screen?", advice: "see my は一息でクリアに発音しましょう。" },
            { q: "音声が少し途切れています。", a: "Your audio is breaking up a little.", advice: "breaking up はリンキングして「ブレイキングアップ」となります。" },
            { q: "チャットボックスにリンクを送ります。", a: "I will send the link in the chat box.", advice: "send the の 'd' は軽く、'the' へ滑らかに繋げます。" },
            { q: "今日のミーティングを始めましょう。", a: "Let's start today's meeting.", advice: "Let's start は「レッツスタート」と一息で発音します。" },
            { q: "今日の議題は新しいプロジェクトについてです。", a: "Today's agenda is about the new project.", advice: "agenda（アジェンダ）は 'gen' にアクセントがあります。" },
            { q: "次の議題に移りましょう。", a: "Let's move on to the next topic.", advice: "move on はリンキングして「ムーヴォン」と発音します。" },
            { q: "これについて質問はありますか。", a: "Do you have any questions about this?", advice: "questions（クエスチョンズ）の 's' をクリアに。" },
            { q: "今のところすべて順調です。", a: "Everything is fine so far.", advice: "so far は「ソーファー」と 'f' を意識して発音します。" },
            { q: "それをチャットに入力してください。", a: "Please type it in the chat.", advice: "type it はリンキングして「タイピット」となります。" },
            { q: "背景の雑音が聞こえます。", a: "I can hear background noise.", advice: "background（バックグラウンド）の 'g' を明瞭に。" },
            { q: "マイクをミュートにします。", a: "I will mute my microphone.", advice: "microphone（マイクォフォン）の 'ph' は 'f' の音です。" },
            { q: "インターネット接続が不安定です。", a: "My internet connection is unstable.", advice: "unstable（アンスティブル）の 'sta' にアクセントがあります。" },
            { q: "退出して入り直します。", a: "I will leave and rejoin.", advice: "leave and は「リーヴアンドゥ」ではなく「リーヴァンドゥ」のように繋げます。" },
            { q: "誰かが話そうとしています。", a: "Someone is trying to speak.", advice: "someone is は「サムワニズ」と繋がって聞こえます。" },
            { q: "先にどうぞお話しください。", a: "Please go ahead and speak.", advice: "go ahead はリンキングして「ゴーアヘッド」となります。" },
            { q: "遮ってしまってすみません。", a: "I am sorry for interrupting.", advice: "interrupting（インタラプティング）は 'rup' を強く。" },
            { q: "画面の資料を見てください。", a: "Please look at the document on the screen.", advice: "look at はリンキングして「ルカット」になります。" },
            { q: "このミーティングは録画されていますか。", a: "Is this meeting being recorded?", advice: "recorded（リコーディドゥ）の 'cor' を強調します。" },
            { q: "時間通りに終了しましょう。", a: "Let's finish on time.", advice: "finish on は「フィニッシュオン」ではなく「フィニッショリ」のように。" },
            { q: "会議の後に議事録を共有します。", a: "I will share the minutes after the meeting.", advice: "minutes（ミニッツ）は「議事録」という意味の重要単語です。" },
            { q: "佐藤さんを数分待ちましょう。", a: "Let's wait a few minutes for Mr. Sato.", advice: "wait a は繋がって「ウェイタ」のように発音します。" },
            { q: "全員揃ったので始めましょう。", a: "Everyone is here, so let's start.", advice: "Everyone は「エヴリワン」と 'v' の音を意識して。" },
            { q: "今日はお時間をいただきありがとうございます。", a: "Thank you for your time today.", advice: "Thank you は「センキュー」と歯の間から息を出して。" },
            { q: "カメラをオンにしてもいいですか。", a: "Is it okay if I turn on my camera?", advice: "turn on はリンキングして「ターノン」と発音します。" },
            { q: "カメラに問題があるようです。", a: "There seems to be a problem with my camera.", advice: "problem（プロブレム）の最初の 'p' をクリアに。" },
            { q: "前のスライドをもう一度見せてください。", a: "Please show me the previous slide again.", advice: "previous（プリーヴィアス）は最初の 'p' を強く。" },
            { q: "次のスライドに進めてください。", a: "Please move to the next slide.", advice: "move to は「ムーヴトゥ」と滑らかに移行します。" },
            { q: "画面を全画面にしてください。", a: "Please make the screen full screen.", advice: "full screen の 'f' と 's' の摩擦音を意識して。" },
            { q: "資料の文字が小さすぎます。", a: "The text on the document is too small.", advice: "too small は「トゥースモール」と繋げます。" },
            { q: "画面を少し拡大してください。", a: "Please zoom in on the screen a little.", advice: "zoom in はリンキングして「ズーミン」となります。" },
            { q: "チャットボックスのファイルを開いてください。", a: "Please open the file in the chat box.", advice: "open the は「オープンザ」と滑らかに。" },
            { q: "この件について意見はありますか。", a: "Do you have any opinions on this matter?", advice: "opinions（オピニオンズ）の 'pi' にアクセント。" },
            { q: "私はその意見に完全に同意します。", a: "I completely agree with that opinion.", advice: "completely（コンプリートリー）は 'plete' を強く。" },
            { q: "その点についてダブルチェックさせてください。", a: "Let me double-check on that point.", advice: "double-check（ダブルチェック）は一気に発音します。" },
            { q: "私の理解が正しいか確認させてください。", a: "Let me confirm if my understanding is correct.", advice: "confirm（コンファーム）の 'f' 音を大切に。" },
            { q: "それはどういう意味ですか。", a: "What do you mean by that?", advice: "mean by は「ミーンバイ」とスムーズに繋げます。" },
            { q: "質問の意味が分かりませんでした。", a: "I didn't understand the meaning of your question.", advice: "didn't は「ディドゥント」と 't' を弱く。" },
            { q: "よく聞こえませんでした。", a: "I couldn't hear you well.", advice: "couldn't hear は「クドゥントヒア」と弱めに繋げます。" },
            { q: "もう少しゆっくり話してください。", a: "Please speak a little slower.", advice: "speak a はリンキングして「スピーカ」になります。" },
            { q: "私の英語は伝わっていますか。", a: "Does my English make sense?", advice: "make sense は「メイクセンス」と一つの単語のように。" },
            { q: "少し席を外します。", a: "I will step away for a moment.", advice: "step away はリンキングして「ステップアウェイ」に。" },
            { q: "戻りました。", a: "I am back.", advice: "am back は「アムバック」ではなく「アムバァクトゥ」の響き。" },
            { q: "今日の主な決定を確認しましょう。", a: "Let's review the main decisions today.", advice: "review（リヴュー）は 'view' にアクセントがあります。" },
            { q: "次のステップについて話し合いましょう。", a: "Let's discuss the next steps.", advice: "discuss（ディスカス）は後半を強く発音します。" },
            { q: "締め切りは来週の金曜日です。", a: "The deadline is next Friday.", advice: "deadline（デッドライン）の 'd' は軽く発音します。" },
            { q: "次のミーティングの日程を決めましょう。", a: "Let's schedule the next meeting.", advice: "schedule（スケジュール）の 'sch' を明瞭に。" },
            { q: "メールで候補日を送ります。", a: "I will send the proposed dates by email.", advice: "proposed（プロポーズドゥ）の 'po' を強く発音します。" },
            { q: "ミーティングに参加していただきありがとうございました。", a: "Thank you for joining the meeting.", advice: "joining は「ジョイニング」とはっきり発音します。" },
            { q: "今ミーティングを退出します。", a: "I will leave the meeting now.", advice: "leave the は「リーヴザ」と流れるように。" },
            { q: "良い一日をお過ごしください。", a: "Have a great day.", advice: "Have a はリンキングして「ハヴァ」と発音します。" },
            { q: "音声にエコーがあります。 ", a: "There is an echo in your audio.", advice: "echo（エコー）の最初の 'e' を強く発音します。" },
            { q: "イヤホンを接続し直してください。", a: "Please reconnect your earphones.", advice: "reconnecting（リコネクティング）は 'nec' を強調。" },
            { q: "画面共有の許可をください。", a: "Please give me permission to share my screen.", advice: "permission（パーミッション）の 'mis' を強く発音します。" },
            { q: "画面共有を停止します。", a: "I will stop sharing my screen.", advice: "sharing my の 'g' から 'm' への移行をスムーズに。" },
            { q: "ファイルをダウンロードしてください。", a: "Please download the file.", advice: "download（ダウンロード）の 'down' を強く。" },
           
            // ここから40個、少し複雑・丁寧なビジネス表現（Q61〜Q100）
            { q: "本日のアジェンダの最初の項目について、詳細をご説明いただけますでしょうか。", a: "Could you please explain the details of the first item on today's agenda?", advice: "Could you please は定番の丁寧表現。流れるように繋げます。" },
            { q: "接続トラブルによりミーティングへの参加が遅れてしまったことを、深くお詫び申し上げます。", a: "I deeply apologize for being late for the meeting due to a connection trouble.", advice: "apologize（アポロジャイズ）の 'po' にアクセントがあります。" },
            { q: "そちら側の準備が整い次第、プレゼンテーションを開始していただければと思います。", a: "I would appreciate it if you could start the presentation as soon as you are ready.", advice: "I would appreciate it if はビジネスでの非常に丁寧な依頼表現です。" },
            { q: "グラフィックの読み込みに少し時間がかかっておりますので、少々お待ちいただけますか。", a: "It is taking a little time to load the graphics, so could you please wait a moment?", advice: "taking a はリンキングして「テイキングァ」と発音します。" },
            { q: "私たちの認識を一致させるために、これまでの議論の要点を簡単にまとめさせてください。", a: "To ensure we are on the same page, let me briefly summarize the main points of our discussion so far.", advice: "on the same page は「認識が一致している」という頻出イディオムです。" },
            { q: "その数字の根拠について、追加のデータや資料を提供していただくことは可能でしょうか。", a: "Would it be possible for you to provide additional data or documents regarding the basis of those numbers?", advice: "Would it be possible for you to は丁寧な打診の定番フレーズです。" },
            { q: "このプロジェクトの進捗に影響を与える可能性のある、潜在的なリスクについて議論しましょう。", a: "Let's discuss potential risks that could affect the progress of this project.", advice: "potential（ポテンシャル）は 'ten' の部分を最も強く発音します。" },
            { q: "技術的な観点から見て、このスケジュールは本当に実現可能だと思われますか。", a: "From a technical point of view, do you think this schedule is truly feasible?", advice: "feasible（フィージブル）は「実現可能」という意味の重要語です。" },
            { q: "他の参加者の方々が発言している間は、マイクをミュートに設定していただけると助かります。", a: "It would be helpful if you could mute your microphone while other participants are speaking.", advice: "It would be helpful if は相手に配慮した柔らかいお願いの表現です。" },
            { q: "電波状況が悪いため、通信帯域を節約するために一度カメラをオフにさせていただきます。", a: "Due to a poor connection, I will turn off my camera for a moment to save bandwidth.", advice: "bandwidth（バンドウィズ）は 'width' の 'th' の摩擦音を意識して。" },
            { q: "議論が少し脱線しているようですので、本来のアジェンダに話を戻してもよろしいでしょうか。", a: "Since the discussion seems to be getting a bit off track, may I bring us back to the original agenda?", advice: "off track は「脱線して」という意味。'may I' で丁寧に許可を取ります。" },
            { q: "この件に関して、マーケティングチームの見解を詳しくお聞かせいただけますか。", a: "Could you share the marketing team's perspective on this matter in more detail?", advice: "perspective（パースペクティヴ）は 'spec' を強調して発音します。" },
            { q: "鈴木さんがおっしゃったことに付け加えて、開発スケジュールに関する補足があります。", a: "In addition to what Mr. Suzuki said, I have a supplementary comment regarding the development schedule.", advice: "In addition to は「〜に加えて」という繋ぎの重要フレーズです。" },
            { q: "現時点ではまだ最終決定を下すための十分な情報が揃っていないように見受けられます。", a: "It appears that we do not have enough information to make a final decision at this moment.", advice: "It appears that は「〜のように見受けられる」という客観的な表現です。" },
            { q: "本日話し合われた重要な決定事項を網羅した議事録を、明日の午前中までに送付いたします。", a: "I will send the minutes covering the important decisions discussed today by tomorrow morning.", advice: "covering（カヴァリング）の 'v' 音をしっかりと意識しましょう。" },
            { q: "次回の定例ミーティングまでに、各自が担当するタスクの進捗状況をアップデートしてください。", a: "Please update the progress of your assigned tasks before the next regular meeting.", advice: "assigned（アサイドン）の最初の 'a' は弱く、'sign' を強く発音します。" },
            { q: "タイムゾーンの変更を考慮した上で、次回のミーティングに最適な日時を調整しましょう。", a: "Let's adjust the best date and time for the next meeting, taking the timezone change into account. ", advice: "take 〜 into account は「〜を考慮に入れる」という熟語です。" },
            { q: "本日の大変有意義なディスカッションに対して、参加者の皆様に心より感謝申し上げます。", a: "I would like to express my sincere gratitude to all participants for today's very productive discussion.", advice: "sincere gratitude（シンシア グラティチュード）で深い感謝を示します。" },
            { q: "通信回線が完全に切断されてしまい、先ほどは突然退出してしまい大変失礼いたしました。", a: "I am very sorry for suddenly leaving earlier because my internet connection was completely cut off.", advice: "cut off はリンキングして「カットオフ」のように発音します。" },
            { q: "提案されている新しい戦略について、何か懸念事項や修正すべき点はございますか。", a: "Do you have any concerns or points that should be revised regarding the proposed new strategy?", advice: "concerns（コンサーンズ）は 'cern' にアクセントがあります。" },
            { q: "クライアントからの最新のフィードバックを反映させるために、設計を一部修正する必要があります。", a: "We need to modify part of the design to reflect the latest feedback from the client.", advice: "modify（モディファイ）は最初の 'mo' をハキハキと発音します。" },
            { q: "予算の制約を考慮すると、このタスクの優先順位を再検討せざるを得ないと考えます。", a: "Considering the budget constraints, I believe we have no choice but to reconsider the priority of this task.", advice: "have no choice but to は「〜せざるを得ない」という強い表現です。" },
            { q: "競合他社の最新の動向を分析したレポートを、画面上で共有しながら説明いたします。", a: "I will explain the report analyzing the latest trends of our competitors while sharing it on the screen.", advice: "competitors（コンペティターズ）は 'pe' にアクセントがあります。" },
            { q: "この課題を解決するためには、国境を越えたチーム間の緊密な連携が不可欠です。", a: "Close cooperation between cross-border teams is essential to solve this issue.", advice: "cooperation（コオペレイション）は 'ra' を強く引き伸ばします。" },
            { q: "当初の計画から大幅に遅れている理由について、具体的な背景を説明していただけますか。", a: "Could you explain the specific background behind the significant delay from the original plan?", advice: "significant（シグニフィカント）は 'nif' を一番強く発音します。" },
            { q: "クラウドサーバーへのアクセス権限がないため、共有されたファイルを閲覧することができません。", a: "I cannot view the shared file because I do not have access permission to the cloud server.", advice: "access permission（アクセス パーミッション）のリズムを意識して。" },
            { q: "この新機能がユーザーの利便性をどのように向上させるか、デモを交えてご紹介します。", a: "I will introduce how this new feature improves user convenience, along with a demonstration.", advice: "demonstration（デモンストレイション）は 'tra' を強調します。" },
            { q: "法的な観点からのリスクを回避するために、法務部の意見を確認する必要性があります。", a: "It is necessary to confirm the legal department's opinion to avoid risks from a legal standpoint.", advice: "standpoint（スタンドポイント）は最初の 'stand' をクリアに。" },
            { q: "次の四半期の販売目標を達成するために、どのようなマーケティング施策が有効でしょうか。", a: "What kind of marketing measures would be effective to achieve the sales target for the next quarter?", advice: "measures（メジャーズ）の 's' は濁る「ジ」の音になります。" },
            { q: "今回のシステム障害の根本的な原因と、今後の再発防止策について詳しく教えてください。", a: "Please tell me in detail about the root cause of this system failure and future preventive measures.", advice: "preventive（プリヴェンティヴ）の 'ven' をしっかりと発音します。" },
            { q: "議題が多岐にわたるため、それぞれの項目にかける時間を厳密に管理したいと思います。", a: "Since the agenda is wide-ranging, I would like to strictly manage the time spent on each item.", advice: "wide-ranging（ワイドレインジング）は両方の単語を明瞭に。" },
            { q: "既存の顧客データを移行する手順について、技術的な詳細を文書で共有していただけますか。", a: "Could you share the technical details in writing regarding the procedure to migrate existing customer data?", advice: "migrate（マイグレイト）は「移行する」というIT・ビジネスの重要語です。" },
            { q: "新しい評価制度の導入に関して、社員からどのようなフィードバックが得られましたか。", a: "What kind of feedback did you receive from employees regarding the introduction of the new evaluation system?", advice: "receive（レシーヴ）は後半の 'ceive' にアクセントがあります。" },
            { q: "サプライチェーンの混乱が私たちの製品の納期に与える影響を、最小限に抑えなければなりません。", a: "We must minimize the impact that supply chain disruptions have on our product delivery times.", advice: "disruptions（ディスラプションズ）の 'p' 音を意識して弾きます。" },
            { q: "ブランドの認知度を最大限に高めるために、複数のソーシャルメディアを活用する方針です。", a: "Our policy is to utilize multiple social media platforms to maximize brand awareness.", advice: "utilize（ユータライジング）の最初の音をクリアに発声。" },
            { q: "長期的な成長を実現するためには、研究開発への投資をさらに拡大していくべきだと確信しています。", a: "I am convinced that we should further expand investment in research and development to achieve long-term growth.", advice: "I am convinced that は「〜だと確信している」というビジネスで好まれる表現です。" },
            { q: "注文内容の変更に関するガイドラインを最新のバージョンに更新しましたので、ご確認ください。", a: "Please check the guidelines regarding order detail changes, as they have been updated to the latest version.", advice: "guidelines（ガイドラインズ）の最初の 'gui' をハキハキと。" },
            { q: "業務の属人化を防ぐために、すべての手順を網羅した詳細なマニュアルを作成しています。", a: "We are creating a detailed manual covering all procedures to prevent tasks from becoming dependent on specific individuals.", advice: "dependent（ディペンデント）のアクセントは真ん中の 'pen' です。" },
            { q: "知的財産権を確実に保護するために、特許の出願手続きを迅速に進める必要があります。", a: "We need to promptly proceed with the patent application process to ensure the protection of our intellectual property rights.", advice: "promptly（プロンプトリー）の 'p' を鋭く息で破裂させます。" },
            { q: "トラブル発生時の緊急連絡網を、最新の従業員データに基づいて修正してください。", a: "Please update the emergency contact network for when troubles occur, based on the latest employee data.", advice: "emergency（イマージェンシー）の 'mer' にアクセントがあります。" }
        ];

        let selectedQuiz = [];
        let currentIdx = 0;
        let isRecording = false;
        let totalQuestions = 10;

        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition = null;

        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.lang = 'en-US';
            recognition.continuous = true;
            recognition.interimResults = true;
        }

        let mediaRecorder = null;
        let audioChunks = [];
        let userAudioBlobs = [];
        let userTranscripts = [];

        const startScreen = document.getElementById('start-screen');
        const practiceScreen = document.getElementById('practice-screen');
        const resultScreen = document.getElementById('result-screen');
        const btnStart = document.getElementById('btn-start');
        const btnRecord = document.getElementById('btn-record');
        const btnNext = document.getElementById('btn-next');
        const btnRestart = document.getElementById('btn-restart');
        const questionNumber = document.getElementById('question-number');
        const questionText = document.getElementById('question-text');
        const progressBar = document.getElementById('progress-bar');
        const timerStatus = document.getElementById('timer');
        const recordStatus = document.getElementById('record-status');
        const liveTranscript = document.getElementById('live-transcript');
        const reportContainer = document.getElementById('report-container');
        const selectCount = document.getElementById('select-count');

        btnStart.onclick = startPractice;
        btnRecord.onclick = toggleRecording;
        btnNext.onclick = nextQuestion;
        btnRestart.onclick = restartPractice;

        function getRandomQuestions(count) {
            return [...questionPool].sort(() => 0.5 - Math.random()).slice(0, count);
        }

        function startPractice() {
            if (!recognition) {
                alert("お使いのブラウザや環境は音声認識に対応していません。Google Chromeでお試しください。");
                return;
            }

            totalQuestions = parseInt(selectCount.value, 10);

            navigator.mediaDevices.getUserMedia({ audio: true })
                .then(stream => {
                    setupMediaRecorder(stream);
                    selectedQuiz = getRandomQuestions(totalQuestions);
                    currentIdx = 0;
                    userTranscripts = [];
                    userAudioBlobs = [];

                    startScreen.style.display = 'none';
                    resultScreen.style.display = 'none';
                    practiceScreen.style.display = 'block';
                    loadQuestion();
                })
                .catch(err => {
                    alert("マイクの使用が許可されていないか、マイクが見つかりません。");
                    console.error(err);
                });
        }

        function setupMediaRecorder(stream) {
            mediaRecorder = new MediaRecorder(stream);

            mediaRecorder.ondataavailable = (event) => {
                if (event.data.size > 0) {
                    audioChunks.push(event.data);
                }
            };

            mediaRecorder.onstop = () => {
                const audioBlob = new Blob(audioChunks, { type: 'audio/mp3' });
                userAudioBlobs[currentIdx] = audioBlob;
                audioChunks = [];
            };
        }

        function loadQuestion() {
            questionNumber.textContent = `第 ${currentIdx + 1} 問 / ${totalQuestions}`;
            questionText.textContent = selectedQuiz[currentIdx].q;
            progressBar.style.width = `${((currentIdx + 1) / totalQuestions) * 100}%`;

            btnNext.disabled = true;
            btnNext.className = "btn-next";
            recordStatus.textContent = "ボタンを押して、マイクに向かって英語で喋ってください";
            liveTranscript.textContent = "";
            btnRecord.className = "btn-record";
            timerStatus.style.display = 'none';
        }

        function toggleRecording() {
            if (!isRecording) {
                try {
                    liveTranscript.textContent = "（聞き取り中...）";
                    userTranscripts[currentIdx] = "";
                    userAudioBlobs[currentIdx] = null;
                    audioChunks = [];

                    recognition.start();
                    if (mediaRecorder && mediaRecorder.state === "inactive") {
                        mediaRecorder.start();
                    }
                } catch (e) {
                    console.log(e);
                }
            } else {
                recognition.stop();
                if (mediaRecorder && mediaRecorder.state === "recording") {
                    mediaRecorder.stop();
                }
            }
        }

        if (recognition) {
            recognition.onstart = () => {
                isRecording = true;
                btnRecord.className = "btn-record recording";
                recordStatus.textContent = "＼ 録音中 ／ 話し終えたら、もう一度ボタンを押して停止";
                timerStatus.style.display = 'inline';
            };

            recognition.onresult = (event) => {
                let interimTranscript = '';
                let finalTranscript = '';

                for (let i = 0; i < event.results.length; ++i) {
                    if (event.results[i].isFinal) {
                        finalTranscript += event.results[i][0].transcript + ' ';
                    } else {
                        interimTranscript += event.results[i][0].transcript;
                    }
                }

                const fullText = (finalTranscript + interimTranscript).trim();
                liveTranscript.textContent = fullText;
                userTranscripts[currentIdx] = fullText;
            };

            recognition.onend = () => {
                isRecording = false;
                btnRecord.className = "btn-record";
                timerStatus.style.display = 'none';

                if (mediaRecorder && mediaRecorder.state === "recording") {
                    mediaRecorder.stop();
                }

                if (!userTranscripts[currentIdx] || userTranscripts[currentIdx].trim() === "") {
                    userTranscripts[currentIdx] = "(聞き取れませんでした)";
                    recordStatus.textContent = "うまく聞き取れませんでした。もう一度お試しいただくか、次へ進んでください。";
                } else {
                    recordStatus.textContent = "聞き取り完了！下部にあなたの英語が表示されています。";
                }

                btnNext.disabled = false;
                btnNext.className = "btn-next active";
            };

            recognition.onerror = (event) => {
                if(event.error === 'not-allowed') {
                    alert("マイクの使用が許可されていません。");
                }
            };
        }

        function nextQuestion() {
            if (currentIdx < totalQuestions - 1) {
                currentIdx++;
                loadQuestion();
            } else {
                showResults();
            }
        }

        function calculateScore(model, user) {
            if (!user || user.includes("聞き取れませんでした")) return 0;

            const cleanWords = (str) => str.toLowerCase().replace(/[.,\/#!$%\^&\*;:{}=\-_`~()?"']/g,"").split(/\s+/).filter(Boolean);
            const modelWords = cleanWords(model);
            const userWords = cleanWords(user);

            let matchCount = 0;
            modelWords.forEach(w => {
                if (userWords.includes(w)) {
                    matchCount++;
                }
            });

            let score = Math.round((matchCount / modelWords.length) * 100);
            return Math.min(score, 100);
        }

        function showResults() {
            practiceScreen.style.display = 'none';
            resultScreen.style.display = 'block';
            reportContainer.innerHTML = '';

            selectedQuiz.forEach((item, index) => {
                const userText = userTranscripts[index] || "(聞き取れませんでした)";
                const score = calculateScore(item.a, userText);
                const isGood = score >= 60;

                const audioBlob = userAudioBlobs[index];
                let audioHtml = '';
                if (audioBlob && userText !== "(聞き取れませんでした)") {
                    const audioUrl = URL.createObjectURL(audioBlob);
                    audioHtml = `<audio src="${audioUrl}" controls class="audio-player"></audio>`;
                } else {
                    audioHtml = `<div style="font-size:0.8rem; color:#94a3b8; margin-top:5px;">※録音データがありません</div>`;
                }

                const div = document.createElement('div');
                div.className = "report-item";
                div.innerHTML = `
                    <div class="report-top">
                        <span style="color:#2563eb;">Q${index + 1}. ${item.q}</span>
                        <span style="background:${isGood ? '#dcfce7':'#fee2e2'}; color:${isGood ? '#166534':'#991b1b'}; padding:2px 8px; border-radius:4px; font-size:0.8rem;">一致度: ${score}%</span>
                    </div>

                    <div class="txt-label">模範解答例（タップで音読 🔊）</div>
                    <div class="model-ans" onclick="speakText(this.dataset.ans)" data-ans="${item.a.replace(/"/g, '&quot;')}" style="cursor:pointer;" title="クリックでお手本音声を再生">${item.a} 🔊</div>

                    <div class="txt-label">AI文字起こし（あなたが喋った言葉）</div>
                    <div class="user-ans ${isGood ? 'good':''}">${userText}</div>

                    <div class="txt-label">あなたの録音（聞き返し）</div>
                    ${audioHtml}

                    <div class="comment-box">
                        <div style="font-weight:bold; color:#1e40af; font-size:0.8rem;">💡 この問題の発音アドバイス</div>
                        <div style="margin-top:3px;">${item.advice}</div>
                    </div>
                `;
                reportContainer.appendChild(div);
            });
        }

        function restartPractice() {
            location.reload();
        }

        function speakText(text) {
           if ('speechSynthesis' in window) {
              window.speechSynthesis.cancel();
              const utterance = new SpeechSynthesisUtterance(text);
              utterance.lang = 'en-US';
              utterance.rate = 0.95;
              window.speechSynthesis.speak(utterance);
           } else {
              alert("お使いのブラウザは音声読み上げに対応していません。Google Chrome等でお試しください。");
           }
        }
    </script>
</body>
</html>
