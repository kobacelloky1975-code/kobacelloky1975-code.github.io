        text: "The world is rapidly moving toward a cashless society, driven by mobile payment apps, digital banking, and contactless credit cards. In countries like Sweden and South Korea, cash transactions account for less than 10% of total retail sales. While this digital transition offers convenience and security, economists warn that a complete elimination of physical currency introduces significant social and financial risks.\n\nThe primary benefits of a cashless economy are efficiency and reduced transaction costs. Digital payments streamline retail operations, eliminating the need for businesses to transport, count, and secure physical money. For governments, a digital ledger enhances tax compliance and reduces the shadow economy. According to a study by the European Central Bank, cash transactions are harder to trace, making them the preferred medium for tax evasion and money laundering. Transitioning to digital records makes illicit financial flows easier to intercept.\n\nDespite these efficiency gains, a cashless society raises severe concerns regarding financial exclusion and digital privacy. Vulnerable populations, including the elderly, low-income citizens, and unbanked individuals, rely heavily on physical cash. A report by the World Bank highlighted that roughly 1.4 billion adults globally remain unbanked, lacking access to digital financial networks. Forcing these individuals into a purely digital economy could cut them off from essential goods and services. Furthermore, relying entirely on digital networks leaves society vulnerable to systemic failures caused by cyberattacks or prolonged power outages.\n\nTo ensure an equitable financial transition, governments must implement protective regulations. Some jurisdictions have passed laws requiring retail businesses to accept physical cash, ensuring that cash remains a valid payment method. Additionally, investing in public digital financial literacy and secure financial infrastructure will be essential. A balanced financial ecosystem should embrace digital convenience while protecting the rights of all citizens.",

      {
        text: "As artificial intelligence and automated systems become capable of performing complex technical tasks, the criteria for career success are shifting. Historically, educational institutions and corporate hiring managers prioritized \"hard skills,\" such as advanced mathematics, data analysis, and programming. However, in an economy where technical tasks are automated, soft skills—such as emotional intelligence, communication, and adaptability—are becoming essential assets.\n\nThe shift toward soft skills is driven by the reality of automation. AI excels at analyzing vast datasets, identifying patterns, and writing software code at speeds humans cannot match. A McKinsey & Company report estimated that by 2030, the demand for technological skills will rise, but the demand for social and emotional skills will grow by over 24% across all industries. While an AI can draft a contract or diagnose an illness, it lacks the human empathy required to comfort a patient or negotiate a complex corporate partnership.\n\nFurthermore, leadership and collaborative skills are vital for navigating the modern workplace. Organizations operate in volatile global environments, requiring teams to adapt to unexpected disruptions. A survey conducted by LinkedIn revealed that 92% of talent professionals believe soft skills are just as important, if not more important, than hard skills when evaluating candidates. Employees who possess strong conflict resolution and cross-cultural communication abilities are essential for maintaining team cohesion and driving corporate innovation.\n\nDespite this recognized value, traditional educational systems remain heavily focused on standardized testing and rote memorization of technical facts. To prepare students for the future labor market, educational curricula must be redesigned. Schools and universities must incorporate project-based learning, public speaking, and ethical reasoning into their core programs. By cultivating uniquely human attributes, education can empower the future workforce to thrive alongside advanced technology.",

    const lessons = rawLessons.map(lesson => ({
      text: lesson.text.replace(/\*\*/g, ''),
      qas: lesson.qas
    }));

    let currentLessonIndex = 0;
    let currentQuizIndex = 0;
   
    let timerInterval = null;
    let timeLeft = 0;
    let initialTimerDuration = 0;

    const coverPage = document.getElementById('coverPage');
    const learningPage = document.getElementById('learningPage');
    const lessonSelectCover = document.getElementById('lessonSelectCover');
    const lessonSelectHeader = document.getElementById('lessonSelectHeader');
    const timerSetting = document.getElementById('timerSetting');
    const startLessonBtn = document.getElementById('startLessonBtn');
   
    const timerDisplayContainer = document.getElementById('timerDisplayContainer');
    const timerTime = document.getElementById('timerTime');

    const textContainer = document.getElementById('readingText');
    const questionText = document.getElementById('quizQuestion');
    const answerContainer = document.getElementById('quizAnswer');
    const quizProgress = document.getElementById('quizProgress');
   
    const showAnsBtn = document.getElementById('showAnsBtn');
    const nextQuizBtn = document.getElementById('nextQuizBtn');
    const lessonTitle = document.getElementById('lessonTitle');
    const headerSelectContainer = document.getElementById('headerSelectContainer');
    const headerLogo = document.getElementById('headerLogo');
    const backToCoverBtn = document.getElementById('backToCoverBtn');

    function init() {
      lessons.forEach((_, index) => {
        const optCover = document.createElement('option');
        optCover.value = index;
        optCover.innerText = `Passage ${index + 1}`;
        lessonSelectCover.appendChild(optCover);

        const optHeader = document.createElement('option');
        optHeader.value = index;
        optHeader.innerText = `Passage ${index + 1}`;
        lessonSelectHeader.appendChild(optHeader);
      });

      startLessonBtn.addEventListener('click', () => {
        const selectedIndex = parseInt(lessonSelectCover.value);
        initialTimerDuration = parseInt(timerSetting.value);
        startLesson(selectedIndex);
      });

      lessonSelectHeader.addEventListener('change', (e) => {
        currentLessonIndex = parseInt(e.target.value);
        currentQuizIndex = 0;
        resetAndStartTimer();
        renderLesson();
      });

      headerLogo.addEventListener('click', showCover);
      backToCoverBtn.addEventListener('click', showCover);
      showAnsBtn.addEventListener('click', showAnswer);
      nextQuizBtn.addEventListener('click', handleNextQuiz);
    }

    function startLesson(index) {
      currentLessonIndex = index;
      currentQuizIndex = 0;
     
      coverPage.classList.add('hidden');
      learningPage.classList.remove('hidden');
      headerSelectContainer.classList.remove('hidden');
     
      resetAndStartTimer();
      renderLesson();
    }

    function showCover() {
      stopTimer();
      lessonSelectCover.value = currentLessonIndex;
     
      learningPage.classList.add('hidden');
      headerSelectContainer.classList.add('hidden');
      coverPage.classList.remove('hidden');
    }

    function resetAndStartTimer() {
      stopTimer();
     
      if (initialTimerDuration === 0) {
        timerDisplayContainer.classList.add('hidden');
        return;
      }
     
      timerDisplayContainer.classList.remove('hidden');
      timeLeft = initialTimerDuration;
      updateTimerUI();

      timerInterval = setInterval(() => {
        timeLeft--;
        updateTimerUI();

        if (timeLeft <= 0) {
          stopTimer();
          timerTime.innerText = "Time Up!";
          timerDisplayContainer.classList.remove('bg-gray-100', 'text-gray-700', 'border-gray-300');
          timerDisplayContainer.classList.add('bg-red-100', 'text-red-700', 'border-red-300');
        }
      }, 1000);
    }

    function stopTimer() {
      if (timerInterval) {
        clearInterval(timerInterval);
        timerInterval = null;
      }
      timerDisplayContainer.classList.remove('bg-red-100', 'text-red-700', 'border-red-300');
      timerDisplayContainer.classList.add('bg-gray-100', 'text-gray-700', 'border-gray-300');
    }

    function updateTimerUI() {
      if (timeLeft < 0) return;
      const minutes = Math.floor(timeLeft / 60);
      const seconds = timeLeft % 60;
      timerTime.innerText = `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
    }

    function renderLesson() {
      const lesson = lessons[currentLessonIndex];
     
      lessonSelectHeader.value = currentLessonIndex;
      lessonTitle.innerText = `Passage ${currentLessonIndex + 1}`;
     
      const paragraphs = lesson.text.split('\n\n').map(p => `<p class="mb-4 text-justify font-sans">${p}</p>`).join('');
      textContainer.innerHTML = paragraphs;
     
      textContainer.parentElement.scrollTop = 0;
     
      renderQuizQuestion();
    }

    function renderQuizQuestion() {
      const lesson = lessons[currentLessonIndex];
      const totalQuizzes = lesson.qas.length;

      answerContainer.classList.add('hidden');
      showAnsBtn.style.display = 'block';

      if (currentQuizIndex < totalQuizzes) {
        quizProgress.innerText = `Critical Question ${currentQuizIndex + 1} / ${totalQuizzes}`;
       
        questionText.classList.remove('fade-in');
        void questionText.offsetWidth;
       
        questionText.innerText = lesson.qas[currentQuizIndex].q;
        questionText.classList.add('fade-in');
       
        nextQuizBtn.innerHTML = `Next Question <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" /></svg>`;
      } else {
        quizProgress.innerText = "Completed!";
        questionText.innerText = "🎉 Excellent. You have parsed all critical analysis questions for this passage!";
        showAnsBtn.style.display = 'none';

        if (currentLessonIndex < lessons.length - 1) {
          nextQuizBtn.innerHTML = `Next Passage <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" /></svg>`;
        } else {
          nextQuizBtn.innerHTML = `Back to Cover`;
        }
      }
    }

    function showAnswer() {
      const lesson = lessons[currentLessonIndex];
      if (currentQuizIndex >= lesson.qas.length) return;

      answerContainer.innerText = lesson.qas[currentQuizIndex].a;
      answerContainer.classList.remove('hidden');
    }

    function handleNextQuiz() {
      const lesson = lessons[currentLessonIndex];
     
      if (currentQuizIndex < lesson.qas.length) {
        currentQuizIndex++;
        renderQuizQuestion();
      } else {
        if (currentLessonIndex < lessons.length - 1) {
          currentLessonIndex++;
          currentQuizIndex = 0;
          resetAndStartTimer();
          renderLesson();
        } else {
          showCover();
        }
      }
    }

    init();
  </script>
</body>
</html>
