<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Learning Hub</title>
    <style>
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background: #f4f7f6; color: #333; margin: 0; padding: 40px 20px; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        h1 { color: #2c3e50; text-align: center; font-size: 24px; margin-bottom: 20px; border-bottom: 2px solid #3498db; padding-bottom: 10px; }
       
        /* 注意書きのスタイル */
        .notice-list { list-style-type: disc; padding-left: 20px; margin-bottom: 30px; font-size: 14px; color: #555; line-height: 1.6; }
        .notice-list li { margin-bottom: 5px; }

        .menu-list { list-style: none; padding: 0; margin: 0; }
        .menu-item { margin-bottom: 15px; }
       
        /* アプリへのリンク（ボタン風のデザイン） */
        .app-link {
            display: block;
            background: #3498db;
            color: white;
            text-decoration: none;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            font-weight: bold;
            transition: background 0.2s;
        }
        .app-link:hover { background: #2980b9; } /* マウスを乗せたときの色 */

        /* 💡 追加：カミングスーン（準備中）用のボタンスタイル */
        .app-link.coming-soon {
            background: #bdc3c7; /* 落ち着いたグレー色 */
            cursor: not-allowed; /* マウスを乗せたときに禁止マークにする */
        }
        .app-link.coming-soon:hover {
            background: #b2b6b8;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>ひろっきーの英語学習ウェブアプリポータル</h1>
       
        <ul class="notice-list">
            <li>発声を録音できますが、書き起こしは間違えることがあります。</li>
            <li>点数は、あくまでも参考までと考えてください。</li>
            <li>回答の例文の読み上げができますが、イントネーションが少し不自然です。</li>
            <li>iPhoneのSafariだと、音声認識が機能しない時があります。</li>
        </ul>
       
        <ul class="menu-list">
            <li class="menu-item">
                <a class="app-link" href="app1.html">英文発話アプリ１（ビジネス会話）</a>
            </li>
            <li class="menu-item">
                <a class="app-link" href="app2.html">英文発話アプリ２（日常会話）</a>
            </li>
            <li class="menu-item">
                <a class="app-link" href="app3.html">英文発話アプリ３（オンラインミーティング）</a>
            </li>
            <li class="menu-item">
                <a class="app-link" href="app4.html">英文発話アプリ４（ミーティングファシリテーション）</a>
            </li>
            <li class="menu-item">
                <a class="app-link" href="app5.html">速読クイズアプリ１</a>
            </li>
            <li class="menu-item">
                <a class="app-link coming-soon" href="#">英文発話アプリ６（Coming Soon...）</a>
            </li>
        </ul>
    </div>

</body>
</html>
